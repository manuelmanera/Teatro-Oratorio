<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale Oratorio San Luigi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #0b0e14; color: white; padding-bottom: 50px; }
        header { background: #161b22; color: white; text-align: center; padding: 1.5rem; border-bottom: 1px solid #30363d; }
        .admin-panel { background: #ffc107; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 100; color: black; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 5px; border: none; font-weight: bold; margin: 5px; }
        #btn-modifica { background: #21262d; color: white; border: 1px solid #30363d; }
        #btn-salva, #btn-aggiungi { background: #238636; color: white; display: none; }
        
        .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }
        .theme-banner { background: #800000; color: white; padding: 25px; text-align: center; border-radius: 12px; margin-bottom: 25px; border: 1px solid #30363d; }
        
        /* BACHECA CON SCROLLBAR */
        .card { background: #161b22; padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        #area-bacheca { 
            max-height: 400px; /* Altezza massima della bacheca */
            overflow-y: auto;  /* Attiva lo scorrimento verticale */
            padding-right: 10px;
        }

        /* Stile barra di scorrimento */
        #area-bacheca::-webkit-scrollbar { width: 8px; }
        #area-bacheca::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }

        .avviso { background: #0d1117; border-left: 5px solid #ffc107; padding: 15px; margin: 15px 0; border-radius: 6px; color: #c9d1d9; }
        .btn-link { display: inline-block; margin-top: 10px; background: #1f6feb; color: white !important; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-size: 0.85rem; font-weight: bold; }
        .editable-active { border: 2px dashed #ffc107 !important; background: #1c2128 !important; padding: 10px; }
        footer { text-align: center; color: #8b949e; font-size: 0.8rem; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        🔐 Area Riservata: 
        <button id="btn-modifica" onclick="verificaPassword()">Accedi per Modificare</button>
        <button id="btn-aggiungi" onclick="aggiungiNuovoAvviso()">+ Nuovo Avviso</button>
        <button id="btn-salva" onclick="pubblicaModifiche()">💾 Pubblica per Tutti</button>
    </div>

    <header>
        <h1>Gruppo Oratorio</h1>
        <p>Comunicazioni ufficiali</p>
    </header>

    <div class="container">
        <div class="theme-banner" id="area-spettacolo">
            <h2>Caricamento...</h2>
        </div>

        <div class="card">
            <h3>Bacheca Avvisi</h3>
            <div id="area-bacheca">
                <p>Aggiornamento avvisi...</p>
            </div>
        </div>
        <footer>&copy; 2026 Oratorio San Luigi | creato da Manuel Manera</footer>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBELSJN5Kj8JfeeWPHIzkGrYzEHVHFG1_c",
            authDomain: "teatro-oratorio.firebaseapp.com",
            databaseURL: "https://teatro-oratorio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "teatro-oratorio",
            storageBucket: "teatro-oratorio.firebasestorage.app",
            messagingSenderId: "180423891976",
            appId: "1:180423891976:web:c241a695014dbc3f8d85bd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const CHIAVE_ACCESSO = "PeppinoBomber";

        // Funzione migliorata per i link (evita di cancellare il testo)
        function generaPulsantiLink(testo) {
            if (!testo) return "";
            const regexLink = /(https?:\/\/[^\s<>]+)/g;
            return testo.replace(regexLink, function(url) {
                // Manteniamo il link visibile nel testo e aggiungiamo il pulsante sotto
                return `${url}<br><a href="${url}" target="_blank" class="btn-link">🔗 Visualizza Link</a>`;
            });
        }

        onValue(ref(db, 'teatro/'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('area-spettacolo').innerHTML = data.spettacolo;
                // Importante: quando leggiamo, trasformiamo i link in pulsanti
                document.getElementById('area-bacheca').innerHTML = generaPulsantiLink(data.bacheca);
            }
        });

        window.verificaPassword = function() {
            let psw = prompt("Inserisci il codice segreto:");
            if (psw === CHIAVE_ACCESSO) {
                // In modalità modifica, mostriamo i link nudi senza pulsanti per poterli editare
                document.getElementById('area-spettacolo').contentEditable = "true";
                document.getElementById('area-bacheca').contentEditable = "true";
                document.getElementById('area-spettacolo').classList.add('editable-active');
                document.getElementById('area-bacheca').classList.add('editable-active');
                
                document.getElementById('btn-modifica').style.display = "none";
                document.getElementById('btn-salva').style.display = "inline-block";
                document.getElementById('btn-aggiungi').style.display = "inline-block";
                
                // Rimuoviamo temporaneamente i pulsanti grafici per pulire il testo da editare
                const linkButtons = document.querySelectorAll('.btn-link');
                linkButtons.forEach(btn => btn.remove());
            } else { alert("Codice errato."); }
        }

        window.aggiungiNuovoAvviso = function() {
            const bacheca = document.getElementById('area-bacheca');
            const dataOggi = new Date().toLocaleDateString('it-IT');
            const nuovoAvviso = `<div class="avviso"><strong>${dataOggi}:</strong> Scrivi qui...</div>`;
            bacheca.innerHTML = nuovoAvviso + bacheca.innerHTML;
        }

        window.pubblicaModifiche = function() {
            const bachElement = document.getElementById('area-bacheca');
            // Prima di salvare, facciamo una copia e puliamo via i pulsanti link
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = bachElement.innerHTML;
            const buttons = tempDiv.querySelectorAll('.btn-link');
            buttons.forEach(b => b.remove());

            set(ref(db, 'teatro/'), {
                spettacolo: document.getElementById('area-spettacolo').innerHTML,
                bacheca: tempDiv.innerHTML // Salviamo solo il testo pulito
            }).then(() => {
                alert("Sito aggiornato!");
                location.reload();
            });
        }
    </script>
</body>
</html>
