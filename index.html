<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale Oratorio San Luigi</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --border: #30363d; --accent: #ffc107; --danger: #e74c3c; --success: #238636; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; }
        
        .admin-panel { background: var(--accent); padding: 10px; text-align: center; position: sticky; top: 0; z-index: 1000; color: black; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        
        .btn-admin, .mgr-btns, #btn-dev-only { display: none !important; }
        body.manager-active .btn-admin, body.manager-active .mgr-btns { display: flex !important; }
        body.dev-mode #btn-dev-only { display: block !important; }

        .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }
        
        /* Banner Rossi Originali */
        .banner-box { background: #800000; padding: 20px; text-align: center; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; }
        .banner-box-titolo { font-size: 2.2rem !important; font-weight: 900 !important; text-transform: uppercase; }
        
        /* Card Avviso */
        .avviso-card { background: #0d1117; border-left: 5px solid var(--accent); padding: 18px; margin-bottom: 15px; border-radius: 8px; position: relative; }
        .is-pinned { border: 2px solid var(--accent) !important; background: #1a1a1a !important; }
        .testo-avviso { font-size: 1.1rem; line-height: 1.4; outline: none; }
        .edit-mode { background: #1c2128; border: 1px dashed var(--accent); padding: 5px; }

        /* Tag e Commenti */
        .badge-stato { padding: 4px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .stato-APERTO { background: var(--success); }
        .stato-CHIUSO { background: var(--danger); }
        .stato-INFO { background: #1f6feb; }
        
        .comment-section { margin-top: 15px; padding-top: 10px; border-top: 1px solid #333; font-size: 0.9rem; }
        .commento { background: #1c2128; padding: 8px; border-radius: 5px; margin-bottom: 5px; position: relative; }
        
        .input-admin { width: 100%; padding: 10px; margin-bottom: 5px; border-radius: 6px; border: 1px solid #333; background: #0d1117; color: white; box-sizing: border-box; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; }
        .modal-content { max-width: 450px; margin: 50px auto; background: var(--card); padding: 25px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <button id="btn-login-main" onclick="apriLogin()">🔐 Accedi</button>
        <button class="btn-admin" onclick="document.getElementById('nuovo-avviso-box').style.display='block'">+ Nuovo Avviso</button>
        <button id="btn-dev-only" onclick="apriPannelloDev()" style="background:white; color:black;">🛡️ Pannello Manuel</button>
        <button class="btn-admin" onclick="logout()" style="background:var(--danger); color:white;">Esci</button>
    </div>

    <div class="container">
        <div id="banner-titolo" class="banner-box banner-box-titolo">GRUPPO ORATORIO</div>
        
        <div id="nuovo-avviso-box" style="display:none; background:var(--card); padding:15px; border-radius:10px; border:1px solid var(--accent); margin-bottom:20px;">
            <select id="new-tag" class="input-admin">
                <option value="INFO">ℹ️ INFO</option>
                <option value="APERTO">🟢 APERTO</option>
                <option value="CHIUSO">🔴 CHIUSO</option>
            </select>
            <textarea id="testo-nuovo" class="input-admin" rows="3" placeholder="Scrivi avviso..."></textarea>
            <button onclick="pubblicaNuovo()" style="background:var(--success); color:white; width:100%;">PUBBLICA</button>
        </div>

        <div id="area-bacheca"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyBELSJN5Kj8JfeeWPHIzkGrYzEHVHFG1_c", databaseURL: "https://teatro-oratorio-default-rtdb.europe-west1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let session = { user: null, isMaster: false };
        const MASTER_USER = "manuel.manera", MASTER_PASS = "PeppinoBomber";

        onValue(ref(db, 'teatro/bacheca_dati'), (snapshot) => renderBacheca(snapshot.val() || {}));

        function renderBacheca(dati) {
            const container = document.getElementById('area-bacheca');
            container.innerHTML = ""; 
            const keys = Object.keys(dati).sort((a,b) => (dati[a].pinned === dati[b].pinned) ? dati[b].timestamp - dati[a].timestamp : dati[a].pinned ? -1 : 1);

            keys.forEach(id => {
                const avv = dati[id];
                const card = document.createElement('div');
                card.className = `avviso-card ${avv.pinned ? 'is-pinned' : ''}`;
                card.innerHTML = `
                    <span class="badge-stato stato-${avv.tag || 'INFO'}">${avv.tag || 'INFO'}</span>
                    <div id="txt-${id}" class="testo-avviso ${session.user ? 'edit-mode' : ''}" contenteditable="${!!session.user}">${avv.testo}</div>
                    <div style="display:flex; justify-content:space-between; margin-top:10px;">
                        <small style="color:gray;">${avv.data} - ${avv.autore}</small>
                        <div class="mgr-btns">
                            ${session.isMaster ? `<button onclick="togglePin('${id}', ${!!avv.pinned})">${avv.pinned ? '📍' : '📌'}</button>` : ''}
                            <button onclick="salvaModifica('${id}')" style="background:blue; color:white; font-size:10px; margin-right:5px;">Salva</button>
                            <button onclick="eliminaAvviso('${id}')" style="background:red; color:white; font-size:10px;">X</button>
                        </div>
                    </div>
                    <div class="comment-section">
                        <div id="lista-comm-${id}"></div>
                        <div style="display:flex; gap:5px; margin-top:5px;">
                            <input type="text" id="in-comm-${id}" class="input-admin" style="margin:0" placeholder="Scrivi un commento...">
                            <button onclick="aggiungiCommento('${id}')" style="background:var(--accent); color:black; padding:5px 10px;">></button>
                        </div>
                    </div>`;
                container.appendChild(card);
                
                // Carica commenti
                onValue(ref(db, `teatro/bacheca_dati/${id}/commenti`), (s) => {
                    const cDiv = document.getElementById(`lista-comm-${id}`);
                    cDiv.innerHTML = "";
                    const cDati = s.val() || {};
                    Object.keys(cDati).forEach(cid => {
                        cDiv.innerHTML += `<div class="commento">
                            <b>${cDati[cid].utente}:</b> ${cDati[cid].testo}
                            ${session.user ? `<button onclick="eliminaComm('${id}','${cid}')" style="background:none; color:red; float:right;">x</button>` : ''}
                        </div>`;
                    });
                });
            });
        }

        // Funzioni Operative
        window.eseguiLogin = () => { /* Logica Master/Utenti come prima */ };
        window.salvaModifica = (id) => update(ref(db, `teatro/bacheca_dati/${id}`), { testo: document.getElementById(`txt-${id}`).innerText });
        window.aggiungiCommento = (id) => {
            const t = document.getElementById(`in-comm-${id}`).value;
            if(!t) return;
            push(ref(db, `teatro/bacheca_dati/${id}/commenti`), { testo: t, utente: session.user || "Anonimo" });
            document.getElementById(`in-comm-${id}`).value = "";
        };
        window.eliminaComm = (id, cid) => remove(ref(db, `teatro/bacheca_dati/${id}/commenti/${cid}`));
        /* ... altre funzioni (Pin, Log, Logout) ripristinate ... */
    </script>
</body>
</html>
