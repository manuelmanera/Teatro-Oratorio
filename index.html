<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale Oratorio San Luigi</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --border: #30363d; --accent: #ffc107; --danger: #e74c3c; --success: #238636; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; }
        
        .admin-panel { background: var(--accent); padding: 10px; text-align: center; position: sticky; top: 0; z-index: 1000; color: black; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; }
        
        .btn-admin, .mgr-btns, #btn-dev-only, #btn-save-titles, #btn-evento-admin { display: none !important; }
        body.manager-active .btn-admin, body.manager-active .mgr-btns, body.manager-active #btn-evento-admin { display: flex !important; }
        body.dev-mode #btn-dev-only { display: block !important; }
        body.can-edit-titles #btn-save-titles { display: block !important; }

        .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }
        .banner-box { background: #800000; padding: 20px; text-align: center; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; outline: none; }
        .banner-box-titolo { font-size: 2.2rem !important; font-weight: 900 !important; text-transform: uppercase; }

        .avviso-card { background: #0d1117; border-left: 5px solid var(--accent); padding: 18px; margin-bottom: 15px; border-radius: 8px; position: relative; border: 1px solid var(--border); overflow: hidden; }
        .testo-avviso { font-size: 1.1rem; line-height: 1.4; outline: none; margin-bottom: 10px; }
        .img-copertina { width: 100%; max-height: 400px; object-fit: cover; border-radius: 6px; margin-bottom: 15px; border: 1px solid #333; }
        .btn-pdf { display: inline-block; background: var(--danger); color: white; padding: 10px; border-radius: 6px; text-decoration: none; font-weight: bold; font-size: 0.9rem; margin-top: 10px; }
        
        .input-admin { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #333; background: #0d1117; color: white; box-sizing: border-box; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { max-width: 500px; margin: 40px auto; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); }
        
        #status-caricamento { display: none; color: var(--accent); font-weight: bold; text-align: center; margin: 10px 0; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <button id="btn-login-main" onclick="apriLogin()">🔐 Accedi</button>
        <button class="btn-admin" onclick="document.getElementById('nuovo-avviso-box').style.display='block'">+ Nuovo Avviso</button>
        <button id="btn-evento-admin" onclick="document.getElementById('modal-evento').style.display='block'" style="background:#ff6600; color:white;">⏲️ Timer</button>
        <button id="btn-dev-only" onclick="apriPannelloDev()" style="background:white; color:black;">⚙️ Utenti</button>
        <button id="btn-save-titles" onclick="salvaTuttoBanner()" style="background:#1f6feb; color:white;">💾 Salva Titoli</button>
        <button class="btn-admin" onclick="location.reload()" style="background:var(--danger); color:white;">Esci</button>
    </div>

    <div class="container">
        <div id="banner-titolo" class="banner-box banner-box-titolo">GRUPPO ORATORIO</div>
        <div id="banner-desc" class="banner-box" style="font-size:1.2rem;">Comunicazioni Ufficiali</div>
        
        <div id="nuovo-avviso-box" style="display:none; background:var(--card); padding:15px; border-radius:10px; border:2px solid var(--accent); margin-bottom:20px;">
            <textarea id="testo-nuovo" class="input-admin" rows="3" placeholder="Scrivi avviso..."></textarea>
            
            <div style="background:#1c2128; padding:10px; border-radius:6px; margin-bottom:10px;">
                <label style="font-size:0.8rem; color:var(--accent);">🖼️ Copertina (Foto):</label>
                <input type="file" id="file-img" accept="image/*" class="input-admin">
                
                <label style="font-size:0.8rem; color:var(--danger);">📄 Allegato (PDF):</label>
                <input type="file" id="file-pdf" accept=".pdf" class="input-admin">
            </div>

            <div id="status-caricamento">⏳ Caricamento file in corso...</div>
            <button id="btn-pubblica" onclick="pubblicaNuovo()" style="background:var(--success); color:white; width:100%; padding:12px;">PUBBLICA AVVISO</button>
        </div>

        <div id="area-bacheca">Caricamento in corso...</div>
    </div>

    <div id="modal-login" class="modal">
        <div class="modal-content">
            <h3>Area Riservata</h3>
            <input type="text" id="login-user" class="input-admin" placeholder="Username">
            <input type="password" id="login-pass" class="input-admin" placeholder="Password">
            <button onclick="eseguiLogin()" style="width:100%; background:var(--accent);">ENTRA</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBELSJN5Kj8JfeeWPHIzkGrYzEHVHFG1_c", 
            databaseURL: "https://teatro-oratorio-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CONFIGURAZIONE IMGBB ---
        const IMGBB_API_KEY = "b2bd2cbba6ca0679055dc317aa5bf613"; // <--- METTI QUI LA TUA CHIAVE!

        let session = { user: null };

        // Conversione PDF in Base64
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        // Caricamento Bacheca
        onValue(ref(db, 'teatro/bacheca_dati'), (snap) => {
            const area = document.getElementById('area-bacheca');
            area.innerHTML = "";
            const dati = snap.val() || {};
            Object.keys(dati).reverse().forEach(id => {
                const a = dati[id];
                area.innerHTML += `
                    <div class="avviso-card">
                        ${a.img ? `<img src="${a.img}" class="img-copertina">` : ''}
                        <div class="testo-avviso">${a.testo}</div>
                        ${a.pdf ? `<a href="${a.pdf}" download="documento.pdf" class="btn-pdf">📥 Scarica PDF</a>` : ''}
                        <div style="font-size:0.7rem; color:gray; margin-top:10px;">${a.data} - Da: ${a.autore}</div>
                        <div class="mgr-btns">
                            <button onclick="eliminaAvviso('${id}')" style="background:red; color:white; font-size:0.7rem; margin-top:10px;">Elimina</button>
                        </div>
                    </div>`;
            });
        });

        // Pubblicazione
        window.pubblicaNuovo = async () => {
            const testo = document.getElementById('testo-nuovo').value;
            const fImg = document.getElementById('file-img').files[0];
            const fPdf = document.getElementById('file-pdf').files[0];
            const status = document.getElementById('status-caricamento');
            const btn = document.getElementById('btn-pubblica');

            if(!testo && !fImg && !fPdf) return alert("Avviso vuoto!");

            btn.disabled = true;
            status.style.display = "block";

            let imgUrl = null;
            let pdfB64 = null;

            try {
                // 1. Carica Immagine su ImgBB
                if (fImg) {
                    const formData = new FormData();
                    formData.append("image", fImg);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const resData = await res.json();
                    imgUrl = resData.data.url;
                }

                // 2. Converti PDF se presente
                if (fPdf) pdfB64 = await toBase64(fPdf);

                // 3. Salva su Firebase
                push(ref(db, 'teatro/bacheca_dati'), {
                    testo: testo,
                    img: imgUrl,
                    pdf: pdfB64,
                    autore: session.user || "Admin",
                    data: new Date().toLocaleDateString('it-IT')
                });

                // Reset
                document.getElementById('nuovo-avviso-box').style.display = 'none';
                document.getElementById('testo-nuovo').value = "";
                document.getElementById('file-img').value = "";
                document.getElementById('file-pdf').value = "";
            } catch (e) {
                alert("Errore nel caricamento dei file.");
            } finally {
                btn.disabled = false;
                status.style.display = "none";
            }
        };

        // Login Manuel
        window.eseguiLogin = () => {
            const u = document.getElementById('login-user').value, p = document.getElementById('login-pass').value;
            if(u === "manuel.manera" && p === "PeppinoBomber") {
                session.user = u;
                document.body.classList.add('manager-active', 'dev-mode', 'can-edit-titles');
                document.getElementById('modal-login').style.display='none';
                document.getElementById('btn-login-main').style.display='none';
            } else { alert("Dati errati"); }
        };
        window.apriLogin = () => document.getElementById('modal-login').style.display='block';
        window.eliminaAvviso = (id) => { if(confirm("Eliminare?")) remove(ref(db, `teatro/bacheca_dati/${id}`)); };
    </script>
</body>
</html>
