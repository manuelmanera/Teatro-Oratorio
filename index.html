<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale Oratorio San Luigi</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --border: #30363d; --accent: #ffc107; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; }
        .admin-panel { background: var(--accent); padding: 10px; text-align: center; position: sticky; top: 0; z-index: 1000; color: black; display: flex; justify-content: center; gap: 5px; flex-wrap: wrap; }
        button { padding: 8px 12px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        .btn-admin { background: #238636; color: white; display: none; }
        .btn-reset { background: var(--danger); color: white; display: none; border: 2px solid black; }
        .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }
        .theme-banner { background: #800000; padding: 20px; text-align: center; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
        #nuovo-avviso-box { display: none; background: var(--card); padding: 15px; border-radius: 10px; border: 2px solid var(--accent); margin-bottom: 20px; }
        .input-admin { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid var(--border); background: #0d1117; color: white; box-sizing: border-box; }
        .bacheca-container { max-height: 600px; overflow-y: auto; background: var(--card); border-radius: 12px; padding: 10px; border: 1px solid var(--border); }
        .avviso-card { background: #0d1117; border-left: 5px solid var(--accent); padding: 15px; margin-bottom: 15px; border-radius: 6px; }
        .testo-avviso { font-size: 1.1rem; line-height: 1.4; margin-bottom: 10px; outline: none; }
        .testo-editabile { background: #1c2128; border: 1px dashed var(--accent); padding: 5px; border-radius: 4px; }
        .footer-avviso { display: flex; flex-wrap: wrap; gap: 8px; justify-content: space-between; align-items: center; border-top: 1px solid #21262d; padding-top: 10px; }
        .btn-comm { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 5px 10px; font-size: 0.8rem; }
        .mgr-btns { display: none; gap: 5px; }
        
        /* MODALE COMMENTI */
        #modal-avviso { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; }
        .modal-content { max-width: 600px; margin: 30px auto; background: var(--card); padding: 20px; border-radius: 12px; position: relative; max-height: 90vh; overflow-y: auto; }
        .comm-item { background: #1c2128; padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 4px solid #58a6ff; }
        .comm-privato { border-left-color: #e74c3c; background: #251a1a; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <button id="btn-login" onclick="login()">🔐 Manager</button>
        <button class="btn-admin" onclick="mostraBoxNuovo()">+ Nuovo</button>
        <button class="btn-admin" onclick="salvaTitolo()">💾 Titolo</button>
        <button id="btn-reset-all" class="btn-reset" onclick="resetTotale()">⚠️ RESET</button>
    </div>

    <div class="container">
        <div class="theme-banner" id="area-spettacolo"><h2>Caricamento...</h2></div>
        <div id="nuovo-avviso-box">
            <textarea id="testo-nuovo" class="input-admin" rows="3" placeholder="Scrivi avviso..."></textarea>
            <button onclick="pubblicaNuovo()" style="background:#238636; color:white; width:100%;">PUBBLICA</button>
        </div>
        <div class="bacheca-container" id="area-bacheca"></div>
    </div>

    <div id="modal-avviso">
        <div class="modal-content">
            <button onclick="chiudiModale()" style="float:right; background:var(--danger); color:white;">X</button>
            <h4 id="testo-focus" style="margin-top:30px; color:var(--accent);"></h4>
            <div id="lista-commenti"></div>
            <hr style="border:0; border-top:1px solid var(--border); margin:20px 0;">
            <input type="text" id="nome-utente" class="input-admin" placeholder="Tuo Nome">
            <textarea id="testo-commento" class="input-admin" placeholder="Scrivi risposta..."></textarea>
            <div style="display:flex; gap:10px;">
                <button onclick="inviaMsg('pubblico')" style="background:#238636; color:white; flex:1;">Pubblico</button>
                <button onclick="inviaMsg('privato')" style="background:#800000; color:white; flex:1;">Privato 🔒</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBELSJN5Kj8JfeeWPHIzkGrYzEHVHFG1_c",
            authDomain: "teatro-oratorio.firebaseapp.com",
            databaseURL: "https://teatro-oratorio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "teatro-oratorio",
            storageBucket: "teatro-oratorio.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const PWD = "PeppinoBomber";
        let isManager = false;
        let avvisoAttivoID = "";

        onValue(ref(db, 'teatro/'), (snapshot) => {
            const data = snapshot.val() || {};
            document.getElementById('area-spettacolo').innerHTML = data.spettacolo || "<h2>Gruppo Oratorio</h2>";
            renderBacheca(data.bacheca_dati || {});
        });

        function renderBacheca(dati) {
            const container = document.getElementById('area-bacheca');
            container.innerHTML = ""; 
            let lista = Object.keys(dati).map(key => ({ id: key, ...dati[key] }));
            lista.sort((a, b) => b.timestamp - a.timestamp);

            lista.forEach((avv) => {
                const card = document.createElement('div');
                card.className = "avviso-card";
                card.innerHTML = `
                    <div id="txt-${avv.id}" class="testo-avviso ${isManager ? 'testo-editabile' : ''}" 
                         contenteditable="${isManager}">${avv.testo}</div>
                    <div class="footer-avviso">
                        <small>${avv.data}</small>
                        <button class="btn-comm" onclick="apriCommenti('${avv.id}', \`${avv.testo.replace(/'/g, "\\'")}\`)">💬 Risposte</button>
                        <div class="mgr-btns" style="${isManager ? 'display:flex' : 'none'}">
                            <button onclick="salvaModifica('${avv.id}')" style="background:#1f6feb; color:white">SALVA</button>
                            <button onclick="eliminaAvviso('${avv.id}')" style="background:var(--danger); color:white">🗑️</button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.login = function() {
            if(prompt("Password:") === PWD) {
                isManager = true;
                document.querySelectorAll(".btn-admin, .btn-reset").forEach(b => b.style.display = "inline-block");
                document.getElementById('btn-login').style.display = "none";
                document.getElementById('area-spettacolo').contentEditable = true;
                onValue(ref(db, 'teatro/bacheca_dati'), (s) => renderBacheca(s.val() || {}), {onlyOnce: true});
            }
        };

        window.apriCommenti = function(id, testo) {
            avvisoAttivoID = id;
            document.getElementById('modal-avviso').style.display = "block";
            document.getElementById('testo-focus').innerText = testo;
            onValue(ref(db, 'commenti_v3/' + id), (snapshot) => {
                const div = document.getElementById('lista-commenti');
                div.innerHTML = "";
                snapshot.forEach((child) => {
                    const c = child.val();
                    if(c.tipo === 'privato' && !isManager) return;
                    div.innerHTML += `<div class="comm-item ${c.tipo==='privato'?'comm-privato':''}">
                        ${isManager ? `<span style="float:right; cursor:pointer" onclick="eliminaComm('${id}','${child.key}')">❌</span>`:''}
                        <b>${c.nome}</b>: ${c.testo} <br><small style="color:#8b949e">${c.ora || ''}</small>
                    </div>`;
                });
            });
        };

        window.chiudiModale = function() { document.getElementById('modal-avviso').style.display = "none"; };

        window.inviaMsg = function(tipo) {
            const n = document.getElementById('nome-utente').value || "Anonimo";
            const t = document.getElementById('testo-commento').value;
            if(!t) return;
            push(ref(db, 'commenti_v3/' + avvisoAttivoID), {
                nome: n, testo: t, tipo: tipo, ora: new Date().toLocaleString()
            });
            document.getElementById('testo-commento').value = "";
        };

        window.eliminaComm = function(idA, idC) { remove(ref(db, `commenti_v3/${idA}/${idC}`)); };
        window.resetTotale = function() {
            if(confirm("Svuoto TUTTA la bacheca?")) {
                set(ref(db, 'teatro/bacheca_dati'), null);
                set(ref(db, 'commenti_v3'), null);
            }
        };
        window.eliminaAvviso = function(id) { if(confirm("Eliminare?")) remove(ref(db, 'teatro/bacheca_dati/' + id)); };
        window.salvaModifica = function(id) {
            const nt = document.getElementById('txt-'+id).innerText;
            update(ref(db, 'teatro/bacheca_dati/' + id), { testo: nt }).then(() => alert("Salvato!"));
        };
        window.pubblicaNuovo = function() {
            const t = document.getElementById('testo-nuovo').value;
            if(!t) return;
            push(ref(db, 'teatro/bacheca_dati'), { testo: t, data: new Date().toLocaleDateString(), timestamp: Date.now() });
            document.getElementById('testo-nuovo').value = "";
            document.getElementById('nuovo-avviso-box').style.display = 'none';
        };
        window.salvaTitolo = function() {
            set(ref(db, 'teatro/spettacolo'), document.getElementById('area-spettacolo').innerHTML).then(() => alert("Titolo salvato!"));
        };
        window.mostraBoxNuovo = function() { document.getElementById('nuovo-avviso-box').style.display = "block"; };
    </script>
</body>
</html>
