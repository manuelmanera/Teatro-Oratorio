<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale Oratorio San Luigi</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --border: #30363d; --text: #c9d1d9; --accent: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; }
        header { background: var(--card); text-align: center; padding: 1.5rem; border-bottom: 1px solid var(--border); }
        
        .admin-panel { background: var(--accent); padding: 10px; text-align: center; position: sticky; top: 0; z-index: 1000; color: black; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; }
        .btn-admin { background: #238636; color: white; display: none; margin: 5px; }
        
        .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }
        .theme-banner { background: #800000; padding: 25px; text-align: center; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); }
        
        /* BACHECA */
        .avviso { background: var(--card); border-left: 5px solid var(--accent); padding: 20px; margin: 15px 0; border-radius: 8px; cursor: pointer; transition: 0.3s; position: relative; }
        .avviso:hover { transform: translateY(-3px); background: #1c2128; }
        .hint-click { display: block; font-size: 0.7rem; color: var(--accent); margin-top: 10px; text-transform: uppercase; }

        /* MODALE (SCHERMATA AVVISO) */
        #modal-avviso { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { max-width: 600px; margin: 40px auto; background: var(--card); padding: 30px; border-radius: 15px; position: relative; border: 1px solid var(--border); }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #8b949e; }
        
        /* COMMENTI */
        .comment-box { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 20px; }
        .input-grande { width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border); background: #0d1117; color: white; font-size: 1.1rem; box-sizing: border-box; }
        .lista-commenti { margin-top: 20px; }
        .commento-item { background: #0d1117; padding: 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border); position: relative; }
        .commento-item b { color: #58a6ff; font-size: 1rem; }
        .del-btn { color: #e74c3c; cursor: pointer; font-weight: bold; margin-left: 10px; display: none; }

        .btn-link { display: inline-block; margin-top: 10px; background: #1f6feb; color: white !important; text-decoration: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; }
        .editable-active { border: 2px dashed var(--accent) !important; padding: 10px; }
        footer { text-align: center; color: #8b949e; font-size: 0.8rem; margin: 40px 0; }
    </style>
</head>
<body>

    <div class="admin-panel">
        🔐 Manager: 
        <button id="btn-login" onclick="login()">Accedi</button>
        <button class="btn-admin" onclick="aggiungiNuovo()">+ Avviso</button>
        <button class="btn-admin" onclick="salvaTutto()">💾 Salva</button>
        <span id="label-privati" class="btn-admin" style="background:#e74c3c; padding: 5px 10px; border-radius: 5px;">Posta Privata Attiva</span>
    </div>

    <header>
        <h1>Oratorio San Luigi</h1>
        <p>Comunicazioni Gruppo Teatro</p>
    </header>

    <div class="container">
        <div class="theme-banner" id="area-spettacolo"><h2>Caricamento...</h2></div>
        <h3 style="display:flex; justify-content: space-between;">Bacheca Avvisi <small style="font-weight:normal; font-size: 0.8rem; color:#8b949e;">Tocca per commentare</small></h3>
        <div id="area-bacheca"></div>
        <footer>&copy; 2026 Oratorio San Luigi | creato da Manuel Manera</footer>
    </div>

    <div id="modal-avviso">
        <div class="modal-content">
            <span class="close-btn" onclick="chiudiModale()">&times;</span>
            <div id="testo-avviso-focus" style="font-size: 1.2rem; line-height: 1.6; color: white;"></div>
            
            <div class="comment-box">
                <h4>Commenti e Risposte</h4>
                <input type="text" id="nome-utente" class="input-grande" placeholder="Il Tuo Nome">
                <textarea id="testo-commento" class="input-grande" style="height: 80px;" placeholder="Scrivi un commento..."></textarea>
                <div style="display: flex; gap: 10px;">
                    <button onclick="inviaMsg('pubblico')" style="background:#238636; color:white; flex:1;">Commento Pubblico</button>
                    <button onclick="inviaMsg('privato')" style="background:#800000; color:white; flex:1;">Messaggio Privato 🔒</button>
                </div>
                <div id="elenco-commenti" class="lista-commenti"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBELSJN5Kj8JfeeWPHIzkGrYzEHVHFG1_c",
            authDomain: "teatro-oratorio.firebaseapp.com",
            databaseURL: "https://teatro-oratorio-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "teatro-oratorio",
            storageBucket: "teatro-oratorio.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const CHIAVE = "PeppinoBomber";
        let isManager = false;
        let idAvvisoCorrente = "";

        // 1. CARICAMENTO DATI
        onValue(ref(db, 'teatro/'), (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('area-spettacolo').innerHTML = data.spettacolo;
                renderBacheca(data.bacheca);
            }
        });

        function renderBacheca(html) {
            const div = document.getElementById('area-bacheca');
            div.innerHTML = html;
            // Trasformiamo i div in elementi cliccabili
            const avvisi = div.querySelectorAll('.avviso');
            avvisi.forEach((el, index) => {
                const id = "avviso_" + index;
                el.setAttribute('onclick', `apriAvviso('${id}', this.innerHTML)`);
                el.innerHTML += `<span class="hint-click">💬 Clicca per leggere o commentare</span>`;
            });
        }

        // 2. MODALE E COMMENTI
        window.apriAvviso = function(id, contenuto) {
            idAvvisoCorrente = id;
            document.getElementById('modal-avviso').style.display = "block";
            // Puliamo il contenuto dal testo "clicca qui"
            let pulito = contenuto.replace('<span class="hint-click">💬 Clicca per leggere o commentare</span>', '');
            document.getElementById('testo-avviso-focus').innerHTML = trasformaLink(pulito);
            caricaCommenti(id);
        };

        window.chiudiModale = function() { document.getElementById('modal-avviso').style.display = "none"; };

        function trasformaLink(t) {
            return t.replace(/(https?:\/\/[^\s<>]+)/g, '<br><a href="$1" target="_blank" class="btn-link">🔗 Apri Link</a>');
        }

        function caricaCommenti(id) {
            onValue(ref(db, 'commenti/' + id), (snapshot) => {
                const div = document.getElementById('elenco-commenti');
                div.innerHTML = "";
                snapshot.forEach((child) => {
                    const c = child.val();
                    const isPrivato = c.tipo === 'privato';
                    
                    // Se è privato, lo mostriamo SOLO se l'utente è Manager
                    if (isPrivato && !isManager) return;

                    div.innerHTML += `
                        <div class="commento-item" style="${isPrivato ? 'border-color:#e74c3c; background:#1c1112' : ''}">
                            <b>${c.nome}</b> ${isPrivato ? '<small>(Privato 🔒)</small>' : ''}
                            <p style="margin:5px 0;">${c.testo}</p>
                            <small style="color:#484f58">${c.data}</small>
                            <span class="del-btn" onclick="eliminaCommento('${id}', '${child.key}')" style="${isManager ? 'display:inline' : 'none'}"> [ELIMINA]</span>
                        </div>`;
                });
            });
        }

        window.inviaMsg = function(tipo) {
            const nome = document.getElementById('nome-utente').value || "Anonimo";
            const testo = document.getElementById('testo-commento').value;
            if(!testo) return;

            push(ref(db, 'commenti/' + idAvvisoCorrente), {
                nome: nome, testo: testo, tipo: tipo, data: new Date().toLocaleString()
            });
            document.getElementById('testo-commento').value = "";
            if(tipo === 'privato') alert("Messaggio privato inviato!");
        };

        // 3. MANAGER
        window.login = function() {
            if (prompt("Codice Segreto:") === CHIAVE) {
                isManager = true;
                document.querySelectorAll(".btn-admin").forEach(b => b.style.display = "inline-block");
                document.getElementById('btn-login').style.display = "none";
                document.getElementById('area-spettacolo').contentEditable = true;
                document.getElementById('area-bacheca').contentEditable = true;
                document.getElementById('area-bacheca').classList.add("editable-active");
                // Pulizia per modifica
                document.querySelectorAll('.hint-click').forEach(s => s.remove());
            }
        };

        window.eliminaCommento = function(idAvv, idComm) {
            if(confirm("Eliminare definitivamente questo commento?")) {
                remove(ref(db, `commenti/${idAvv}/${idComm}`));
            }
        };

        window.aggiungiNuovo = function() {
            const b = document.getElementById('area-bacheca');
            b.innerHTML = `<div class="avviso"><strong>${new Date().toLocaleDateString()}:</strong> Nuovo avviso...</div>` + b.innerHTML;
        };

        window.salvaTutto = function() {
            const spet = document.getElementById('area-spettacolo').innerHTML;
            const bachecaHTML = document.getElementById('area-bacheca').innerHTML;
            set(ref(db, 'teatro/'), { spettacolo: spet, bacheca: bachecaHTML }).then(() => location.reload());
        };
    </script>
</body>
</html>
