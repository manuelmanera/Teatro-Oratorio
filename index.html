<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestionale Oratorio San Luigi</title>
    <style>
        :root { --bg: #0b0e14; --card: #161b22; --border: #30363d; --accent: #ffc107; --danger: #e74c3c; --success: #238636; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: white; }
        
        .admin-panel { background: var(--accent); padding: 10px; text-align: center; position: sticky; top: 0; z-index: 1000; color: black; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; transition: 0.2s; }
        
        /* Gestione visibilità */
        .btn-admin, .mgr-btns, #btn-dev-only, #btn-save-titles, #btn-evento-admin { display: none !important; }
        body.manager-active .btn-admin, body.manager-active .mgr-btns, body.manager-active #btn-evento-admin { display: inline-block !important; }
        body.dev-mode #btn-dev-only { display: inline-block !important; }
        body.can-edit-titles #btn-save-titles { display: inline-block !important; }

        .container { max-width: 700px; margin: 20px auto; padding: 0 15px; }
        .banner-box { background: #800000; padding: 20px; text-align: center; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px; outline: none; }
        .banner-box-titolo { font-size: 2.2rem !important; font-weight: 900 !important; text-transform: uppercase; }

        .avviso-card { background: #0d1117; border-left: 5px solid var(--accent); padding: 18px; margin-bottom: 15px; border-radius: 8px; border: 1px solid var(--border); }
        .input-admin { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #333; background: #0d1117; color: white; box-sizing: border-box; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; overflow-y: auto; }
        .modal-content { max-width: 550px; margin: 40px auto; background: var(--card); padding: 25px; border-radius: 15px; border: 1px solid var(--border); }
        
        .user-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .user-row { background: #0d1117; border-bottom: 1px solid #333; }
        .user-row td { padding: 8px; }
        .user-row input { background: #161b22; border: 1px solid #444; color: white; padding: 5px; border-radius: 4px; width: 90%; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="admin-panel">
        <button id="btn-login-main" onclick="apriLogin()">🔐 Accedi</button>
        <button class="btn-admin" onclick="document.getElementById('modal-nuovo-avviso').style.display='block'">+ Nuovo Avviso</button>
        <button id="btn-dev-only" onclick="apriPannelloDev()" style="background:white; color:black;">⚙️ Gestione Utenti</button>
        <button class="btn-admin" onclick="location.reload()" style="background:var(--danger); color:white;">Esci</button>
    </div>

    <div class="container">
        <div id="banner-titolo" class="banner-box banner-box-titolo">GRUPPO ORATORIO</div>
        <div id="banner-desc" class="banner-box">Comunicazioni Ufficiali</div>
        <div id="area-bacheca">Caricamento messaggi...</div>
    </div>

    <div id="modal-login" class="modal">
        <div class="modal-content">
            <h3>🔐 Accesso Gestionale</h3>
            <input type="text" id="l-user" class="input-admin" placeholder="Username">
            <input type="password" id="l-pass" class="input-admin" placeholder="Password">
            <button onclick="eseguiLogin()" style="width:100%; background:var(--accent); color:black;">ENTRA</button>
            <button onclick="document.getElementById('modal-login').style.display='none'" style="width:100%; margin-top:10px; background:transparent; color:gray;">Annulla</button>
        </div>
    </div>

    <div id="modal-dev" class="modal"><div class="modal-content">
        <h3 style="color:var(--accent)">👥 Elenco Account</h3>
        <table class="user-table">
            <thead><tr style="font-size: 0.7rem; color: gray; text-align: left;"><th>User</th><th>Pass</th><th>Azioni</th></tr></thead>
            <tbody id="body-utenti"></tbody>
        </table>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <h4>➕ Nuovo Utente</h4>
        <input type="text" id="new-u" class="input-admin" placeholder="Username">
        <input type="text" id="new-p" class="input-admin" placeholder="Password">
        <button onclick="aggiungiUtente()" style="width:100%; background:var(--success); color:white;">AGGIUNGI</button>
        <button onclick="document.getElementById('modal-dev').style.display='none'" style="width:100%; margin-top:10px; background: transparent; color: gray;">Chiudi</button>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBELSJN5Kj8JfeeWPHIzkGrYzEHVHFG1_c", 
            databaseURL: "https://teatro-oratorio-default-rtdb.europe-west1.firebasedatabase.app" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let session = { user: null };

        // --- CARICAMENTO BACHECA ---
        onValue(ref(db, 'teatro/bacheca'), (snapshot) => {
            const area = document.getElementById('area-bacheca');
            area.innerHTML = "";
            const dati = snapshot.val();
            if(!dati) { area.innerHTML = "Nessun avviso presente."; return; }
            
            Object.keys(dati).reverse().forEach(id => {
                const avviso = dati[id];
                const card = document.createElement('div');
                card.className = "avviso-card";
                card.innerHTML = `<h3>${avviso.titolo}</h3><p>${avviso.testo}</p>`;
                area.appendChild(card);
            });
        });

        // --- FUNZIONI GLOBALI ---
        window.apriLogin = () => document.getElementById('modal-login').style.display='block';

        window.eseguiLogin = () => {
            const u = document.getElementById('l-user').value;
            const p = document.getElementById('l-pass').value;
            
            if(u === "manuel.manera" && p === "PeppinoBomber") { 
                attivaSessione("admin"); 
            } else {
                onValue(ref(db, 'teatro/utenti'), (s) => {
                    let ok = false;
                    const users = s.val() || {};
                    for(let id in users) { 
                        if(users[id].username === u && users[id].password === p) { 
                            attivaSessione("manager"); ok = true; break; 
                        } 
                    }
                    if(!ok) alert("Credenziali errate!");
                }, {onlyOnce: true});
            }
        };

        function attivaSessione(tipo) {
            session.user = document.getElementById('l-user').value || "Admin";
            document.body.classList.add('manager-active');
            if(tipo === "admin") document.body.classList.add('dev-mode', 'can-edit-titles');
            document.getElementById('modal-login').style.display = 'none';
            document.getElementById('btn-login-main').style.display = 'none';
            alert("Benvenuto " + session.user);
        }

        window.apriPannelloDev = () => {
            document.getElementById('modal-dev').style.display='block';
            onValue(ref(db, 'teatro/utenti'), (snapshot) => {
                const tbody = document.getElementById('body-utenti');
                tbody.innerHTML = "";
                const utenti = snapshot.val();
                for(let id in utenti) {
                    const tr = document.createElement('tr');
                    tr.className = "user-row";
                    tr.innerHTML = `
                        <td><input type="text" value="${utenti[id].username}" id="u-${id}"></td>
                        <td><input type="text" value="${utenti[id].password}" id="p-${id}"></td>
                        <td><button onclick="rimuoviUtente('${id}')">🗑️</button></td>`;
                    tbody.appendChild(tr);
                }
            });
        };

        window.aggiungiUtente = () => {
            const username = document.getElementById('new-u').value;
            const password = document.getElementById('new-p').value;
            if(username && password) {
                push(ref(db, 'teatro/utenti'), { username, password });
                document.getElementById('new-u').value = ""; document.getElementById('new-p').value = "";
            }
        };

        window.rimuoviUtente = (id) => {
            if(confirm("Eliminare l'utente?")) remove(ref(db, `teatro/utenti/${id}`));
        };
    </script>
</body>
</html>
